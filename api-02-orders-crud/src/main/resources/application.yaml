spring:
  application:
    name: api-01-auth-gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/ordersystem_orders_db
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

management:
  server:
    port: 8003
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

logging:
  level:
    org.springframework.security: DEBUG
