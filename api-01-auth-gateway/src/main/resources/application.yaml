spring:
  application:
    name: api-01-auth-gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/ordersystem_auth_db
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 3600000
  gateway:
    downstream-url: http://localhost:8081

springdoc:
  swagger-ui:
    urls:
      - name: "01 - Authentication"
        url: /v3/api-docs
      - name: "02 - Orders Management"
        url: /api/orders/v3/api-docs
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
  show-actuator: true

server:
  port: 8080

management:
  server:
    port: 8002
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

logging:
  level:
    org.springframework.security: DEBUG
