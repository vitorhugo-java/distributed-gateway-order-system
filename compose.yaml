services:
  postgres:
    image: postgres:17-alpine
    hostname: postgres
    container_name: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d ordersystem_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - infra_network
      - ordersystem_network

volumes:
  postgres_data:
    name: postgres_data

networks:
  ordersystem_network:
    name: ordersystem_network
    driver: bridge
