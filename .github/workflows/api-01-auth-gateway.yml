name: CI/CD - api-01-auth-gateway

on:
  push:
    branches: [main]
    paths:
      - "api-01-auth-gateway/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - ".github/workflows/api-01-auth-gateway.yml"
  pull_request:
    branches: [main]
    paths:
      - "api-01-auth-gateway/**"
      - "api-02-orders-crud/**"
      - "build.gradle"
      - "settings.gradle"
  workflow_dispatch:

env:
  GRAALVM_ENV: graalvm-community-java21
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/api-auth-gateway
  MODULE_NAME: api-01-auth-gateway
  NATIVE_BINARY_PATH: api-01-auth-gateway/build/native/nativeCompile/api-01-auth-gateway
  GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
  GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

jobs:
  # ────────────────────────────────────────────────────────────
  # Stage 1 — Unit Tests
  # ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up ${{ env.GRAALVM_ENV }}
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize gradlew and set executable
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :api-01-auth-gateway:test :api-01-auth-gateway:jacocoTestReport --no-daemon

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: api-01-auth-gateway/build/reports/tests/

  # ────────────────────────────────────────────────────────────
  # Stage 2 — Build native image & publish to GHCR
  # ────────────────────────────────────────────────────────────
  build-publish:
    name: Build Native And Publish
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up ${{ env.GRAALVM_ENV }}
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize gradlew and set executable
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Build native binary
        run: ./gradlew clean :api-01-auth-gateway:nativeCompile -x test --no-daemon

      - name: Create runtime Dockerfile
        run: |
          cat > Dockerfile.native-runtime <<'EOF'
          FROM debian:bookworm-slim
          RUN apt-get update \
              && apt-get install -y --no-install-recommends zlib1g \
              && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY app-exe ./app-exe
          RUN chmod +x ./app-exe
          EXPOSE 8080
          ENTRYPOINT ["./app-exe"]
          EOF

      - name: Prepare Docker build context
        run: cp "${{ env.NATIVE_BINARY_PATH }}" app-exe

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push latest image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.native-runtime
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
