name: Docker Publish - JVM Images

on:
  push:
    branches: [main]
    paths:
      - "api-01-auth-gateway/**"
      - "api-02-orders-crud/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/images-multi-module.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-api-01-auth-gateway:
    name: Build and Push api-01-auth-gateway JVM Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/api-01-auth-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize Gradle wrappers and set executable bit
        run: |
          find . -type f -name "gradlew" -exec sed -i 's/\r$//' {} +
          find . -type f -name "gradlew" -exec chmod +x {} +

      - name: Run api-01-auth-gateway tests
        run: ./gradlew :api-01-auth-gateway:test --no-daemon

      - name: Build bootWar
        run: ./gradlew :api-01-auth-gateway:bootWar -x test --no-daemon

      - name: Prepare Docker context
        run: |
          cp api-01-auth-gateway/build/libs/*-SNAPSHOT.war app.war
          cat > Dockerfile.jvm <<'EOF'
          FROM eclipse-temurin:21-jre-alpine
          WORKDIR /app
          COPY app.war app.war
          EXPOSE 8080
          ENTRYPOINT ["java", "-jar", "app.war"]
          EOF

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jvm
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  build-api-02-orders-crud:
    name: Build and Push api-02-orders-crud JVM Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/api-02-orders-crud

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize Gradle wrappers and set executable bit
        run: |
          find . -type f -name "gradlew" -exec sed -i 's/\r$//' {} +
          find . -type f -name "gradlew" -exec chmod +x {} +

      - name: Run api-02-orders-crud tests
        run: ./gradlew :api-02-orders-crud:test --no-daemon

      - name: Build bootWar
        run: ./gradlew :api-02-orders-crud:bootWar -x test --no-daemon

      - name: Prepare Docker context
        run: |
          cp api-02-orders-crud/build/libs/*-SNAPSHOT.war app.war
          cat > Dockerfile.jvm <<'EOF'
          FROM eclipse-temurin:21-jre-alpine
          WORKDIR /app
          COPY app.war app.war
          EXPOSE 8081
          ENTRYPOINT ["java", "-jar", "app.war"]
          EOF

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.jvm
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
