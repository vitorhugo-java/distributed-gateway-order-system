name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  documentation:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build tests, coverage, and Javadocs
        run: ./gradlew test jacocoTestReport aggregateJacocoReport aggregateJavadoc --no-daemon

      - name: Prepare public folder
        run: |
          rm -rf public
          mkdir -p public/jacoco
          mkdir -p public/javadoc
          cp -r build/reports/jacoco/aggregateJacocoReport/. public/jacoco/
          cp -r build/docs/aggregated-javadoc/. public/javadoc/
          cp index.html public/index.html
          touch public/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
