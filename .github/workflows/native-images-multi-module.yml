name: Native Images - Multi Module

on:
  push:
    branches: [main]
    paths:
      - "api-01-auth-gateway/**"
      - "api-02-orders-crud/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/native-images-multi-module.yml"
  workflow_dispatch:

env:
  GRAALVM_ENV: graalvm-community-java21
  REGISTRY: ghcr.io

jobs:
  build-api-01-auth-gateway:
    name: Build and Push api-01-auth-gateway Native Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      MODULE_NAME: api-01-auth-gateway
      IMAGE_NAME: ${{ github.repository_owner }}/api-01-auth-gateway
      NATIVE_BINARY_PATH: api-01-auth-gateway/build/native/nativeCompile/api-01-auth-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up ${{ env.GRAALVM_ENV }}
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize Gradle wrappers and set executable bit
        run: |
          find . -type f -name "gradlew" -exec sed -i 's/\r$//' {} +
          find . -type f -name "gradlew" -exec chmod +x {} +

      - name: Build native binary (root multi-module context)
        run: ./gradlew clean :api-01-auth-gateway:nativeCompile -x test --no-daemon

      - name: Prepare Docker context
        run: cp "${{ env.NATIVE_BINARY_PATH }}" app-exe

      - name: Create runtime Dockerfile
        run: |
          cat > Dockerfile.native-runtime <<'EOF'
          FROM debian:bookworm-slim
          RUN apt-get update \
              && apt-get install -y --no-install-recommends zlib1g \
              && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY app-exe ./app-exe
          RUN chmod +x ./app-exe
          EXPOSE 8080
          ENTRYPOINT ["./app-exe"]
          EOF

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push latest image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.native-runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  build-api-02-orders-crud:
    name: Build and Push api-02-orders-crud Native Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      MODULE_NAME: api-02-orders-crud
      IMAGE_NAME: ${{ github.repository_owner }}/api-02-orders-crud
      NATIVE_BINARY_PATH: api-02-orders-crud/build/native/nativeCompile/api-02-orders-crud

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up ${{ env.GRAALVM_ENV }}
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Normalize Gradle wrappers and set executable bit
        run: |
          find . -type f -name "gradlew" -exec sed -i 's/\r$//' {} +
          find . -type f -name "gradlew" -exec chmod +x {} +

      - name: Build native binary (root multi-module context)
        run: ./gradlew clean :api-02-orders-crud:nativeCompile -x test --no-daemon

      - name: Prepare Docker context
        run: cp "${{ env.NATIVE_BINARY_PATH }}" app-exe

      - name: Create runtime Dockerfile
        run: |
          cat > Dockerfile.native-runtime <<'EOF'
          FROM debian:bookworm-slim
          RUN apt-get update \
              && apt-get install -y --no-install-recommends zlib1g \
              && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY app-exe ./app-exe
          RUN chmod +x ./app-exe
          EXPOSE 8081
          ENTRYPOINT ["./app-exe"]
          EOF

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push latest image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.native-runtime
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-api-01-auth-gateway:
    name: Deploy api-01-auth-gateway to Server
    runs-on: ubuntu-latest
    needs: build-api-01-auth-gateway
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/api-01-auth-gateway
      REGISTRY: ghcr.io

    steps:
      - name: SSH deploy — pull image and restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            COMPOSE_FILE="/docker/distributed-gateway-order-system/api-auth/docker-compose.yml"

            echo "==> Pulling latest image: $IMAGE"
            docker pull "$IMAGE"

            echo "==> Restarting api-auth service..."
            docker compose -f "$COMPOSE_FILE" up -d --force-recreate api-auth

            echo "==> Active containers:"
            docker compose -f "$COMPOSE_FILE" ps

            echo "==> Deploy complete."

  deploy-api-02-orders-crud:
    name: Deploy api-02-orders-crud to Server
    runs-on: ubuntu-latest
    needs: build-api-02-orders-crud
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/api-02-orders-crud
      REGISTRY: ghcr.io

    steps:
      - name: SSH deploy — pull image and restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            COMPOSE_FILE="/docker/distributed-gateway-order-system/api-orders/docker-compose.yml"

            echo "==> Pulling latest image: $IMAGE"
            docker pull "$IMAGE"

            echo "==> Restarting api-orders service..."
            docker compose -f "$COMPOSE_FILE" up -d --force-recreate api-orders

            echo "==> Active containers:"
            docker compose -f "$COMPOSE_FILE" ps

            echo "==> Deploy complete."
