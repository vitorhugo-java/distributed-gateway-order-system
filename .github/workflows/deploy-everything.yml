name: Deploy Everything (Docs, Tests, Coverage)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Reports (All modules)
        continue-on-error: true
        run: |
          ./gradlew test jacocoTestReport javadoc --no-daemon
          
      - name: Consolidate Reports into build/docs/reports
        run: |
          rm -rf build/docs/reports
          mkdir -p build/docs/reports/auth-gateway/docs build/docs/reports/auth-gateway/tests build/docs/reports/auth-gateway/coverage
          mkdir -p build/docs/reports/order-system/docs build/docs/reports/order-system/tests build/docs/reports/order-system/coverage

          # Organize Auth Gateway
          cp -r api-01-auth-gateway/build/docs/javadoc/* build/docs/reports/auth-gateway/docs/ || true
          cp -r api-01-auth-gateway/build/reports/tests/test/* build/docs/reports/auth-gateway/tests/ || true
          cp -r api-01-auth-gateway/build/reports/jacoco/test/html/* build/docs/reports/auth-gateway/coverage/ || true

          # Organize Order System
          cp -r api-02-orders-crud/build/docs/javadoc/* build/docs/reports/order-system/docs/ || true
          cp -r api-02-orders-crud/build/reports/tests/test/* build/docs/reports/order-system/tests/ || true
          cp -r api-02-orders-crud/build/reports/jacoco/test/html/* build/docs/reports/order-system/coverage/ || true

          # Create a small dashboard index
          mkdir -p build/docs/reports
          cat <<EOF > build/docs/reports/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>Project Dashboard</title>
            <style>
              body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; padding: 2rem; }
              h1 { border-bottom: 1px solid #333; padding-bottom: 1rem; }
              .module { margin-bottom: 2rem; border: 1px solid #333; padding: 1rem; border-radius: 8px; }
              a { color: #bb86fc; text-decoration: none; display: inline-block; margin-right: 1rem; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Project Dashboard</h1>
            <div class="module">
              <h2>Auth Gateway</h2>
              <a href="auth-gateway/docs/index.html">Documentation</a>
              <a href="auth-gateway/tests/index.html">Test Reports</a>
              <a href="auth-gateway/coverage/index.html">Coverage</a>
            </div>
            <div class="module">
              <h2>Order System</h2>
              <a href="order-system/docs/index.html">Documentation</a>
              <a href="order-system/tests/index.html">Test Reports</a>
              <a href="order-system/coverage/index.html">Coverage</a>
            </div>
          </body>
          </html>
          EOF

      - name: Generate Dashboard
        run: |
          cat <<EOF > public-site/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <title>Project Dashboard</title>
              <style>
                  body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; padding: 2rem; }
                  h1 { border-bottom: 1px solid #333; padding-bottom: 1rem; }
                  .module { margin-bottom: 2rem; border: 1px solid #333; padding: 1rem; border-radius: 8px; }
                  a { color: #bb86fc; text-decoration: none; display: inline-block; margin-right: 1rem; }
                  a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <h1>Project Dashboard</h1>
              
              <div class="module">
                  <h2>Auth Gateway</h2>
                  <a href="auth-gateway/docs/index.html">Documentation</a>
                  <a href="auth-gateway/tests/index.html">Test Reports</a>
                  <a href="auth-gateway/coverage/index.html">Coverage</a>
              </div>

              <div class="module">
                  <h2>Order System</h2>
                  <a href="order-system/docs/index.html">Documentation</a>
                  <a href="order-system/tests/index.html">Test Reports</a>
                  <a href="order-system/coverage/index.html">Coverage</a>
              </div>
          </body>
          </html>
          EOF

      - name: Ensure .nojekyll and Deploy to GitHub Pages
        run: |
          # ensure .nojekyll so GitHub Pages serves directories starting with underscores
          touch build/docs/reports/.nojekyll
        shell: bash

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/docs/reports
