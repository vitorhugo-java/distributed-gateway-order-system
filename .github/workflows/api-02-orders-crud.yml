name: CI/CD — api-02-orders-crud

on:
  push:
    branches: [main]
    paths:
      - "api-02-orders-crud/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - ".github/workflows/api-02-orders-crud.yml"
  pull_request:
    branches: [main]
    paths:
      - "api-02-orders-crud/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - ".github/workflows/api-02-orders-crud.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/api-orders-crud

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :api-02-orders-crud:test :api-02-orders-crud:jacocoTestReport --no-daemon

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-api-02
          path: api-02-orders-crud/build/reports/tests/

  build-publish:
    name: Build Native & Publish
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (--target native)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api-02-orders-crud/Dockerfile
          target: native
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build-publish
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: SSH deploy — pull image and restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            COMPOSE_FILE="/docker/distributed-gateway-order-system/api-orders/docker-compose.yml"

            echo "==> Pulling latest image: $IMAGE"
            docker pull "$IMAGE"

            echo "==> Restarting api-orders service..."
            docker compose -f "$COMPOSE_FILE" up -d --force-recreate api-orders

            echo "==> Active containers:"
            docker compose -f "$COMPOSE_FILE" ps

            echo "==> Deploy complete."
